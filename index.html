 <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Midnight – Conexão</title>

<style>
body{
  margin:0;
  background:#0B0B0D;
  color:#C6A75E;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

.card{
  background:#111;
  padding:30px;
  border-radius:30px;
  box-shadow:0 0 40px rgba(198,167,94,0.25);
}

button{
  background:linear-gradient(145deg,#C6A75E,#a88d4f);
  border:none;
  padding:14px;
  border-radius:15px;
  font-weight:bold;
  margin-top:15px;
  width:100%;
  color:#000;
}

.hidden{ display:none; }

svg{
  margin:20px 0;
}

.timer{
  font-size:40px;
  margin:20px 0;
}

.fine-line{
  stroke:#C6A75E;
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
</style>
</head>

<body>

<div class="container">

<div id="home" class="card">
  <h2>Midnight Ritual</h2>
  <button onclick="drawCard()">Sortear Momento</button>
</div>

<div id="cardScreen" class="card hidden">
  <h3 id="name"></h3>
  <div id="silhouette"></div>
  <p id="desc"></p>
  <button onclick="startMoment()">Iniciar</button>
</div>

<div id="momentScreen" class="card hidden">
  <h3>Conectem-se</h3>
  <div class="timer" id="timer">60</div>
</div>

</div>

<script>

const cards = [
{
name:"Lótus",
desc:"Sentados frente a frente, abraçados.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
  <!-- Cabeças -->
  <circle cx="95" cy="70" r="10" class="fine-line"/>
  <circle cx="125" cy="70" r="10" class="fine-line"/>

  <!-- Tronco esquerdo -->
  <path d="M95 80 Q85 110 95 140" class="fine-line"/>
  
  <!-- Tronco direito -->
  <path d="M125 80 Q135 110 125 140" class="fine-line"/>

  <!-- Pernas cruzadas -->
  <path d="M95 140 Q75 165 110 170" class="fine-line"/>
  <path d="M125 140 Q145 165 110 170" class="fine-line"/>

  <!-- Braços envolvendo -->
  <path d="M95 100 Q110 105 125 100" class="fine-line"/>
</svg>`
},

{
name:"Conchinha",
desc:"Deitados lado a lado em proximidade.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
  <circle cx="85" cy="95" r="10" class="fine-line"/>
  <circle cx="115" cy="100" r="10" class="fine-line"/>

  <path d="M85 105 Q95 130 115 140" class="fine-line"/>
  <path d="M115 110 Q135 135 155 145" class="fine-line"/>
</svg>`
},

{
name:"Frente a Frente",
desc:"Em pé, próximos, mantendo contato visual.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
  <circle cx="90" cy="70" r="10" class="fine-line"/>
  <circle cx="130" cy="70" r="10" class="fine-line"/>

  <path d="M90 80 Q90 120 90 160" class="fine-line"/>
  <path d="M130 80 Q130 120 130 160" class="fine-line"/>

  <path d="M90 110 Q110 120 130 110" class="fine-line"/>
</svg>`
}
];

let timeLeft = 60;
let countdown;

function drawCard(){
  const random = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("name").innerText = random.name;
  document.getElementById("desc").innerText = random.desc;
  document.getElementById("silhouette").innerHTML = random.svg;
  switchScreen("cardScreen");
}

function startMoment(){
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;
  switchScreen("momentScreen");

  countdown = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft<=0){
      clearInterval(countdown);
      switchScreen("home");
    }
  },1000);
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("cardScreen").classList.add("hidden");
  document.getElementById("momentScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

</script>

</body>
</html>
