<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ritual – Verdade ou Desafio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at center,#1a1a1f 0%,#0B0B0D 70%);
  color:#C6A75E;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

.card{
  background:rgba(20,20,25,0.95);
  padding:30px;
  border-radius:30px;
  box-shadow:0 0 40px rgba(198,167,94,0.25);
}

button{
  background:linear-gradient(145deg,#C6A75E,#a88d4f);
  border:none;
  padding:14px;
  border-radius:15px;
  font-weight:bold;
  margin-top:12px;
  width:100%;
  color:#000;
}

.hidden{ display:none; }

.energy-container{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}

.energy-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#8B0000,#C6A75E);
  transition:width 0.6s ease;
}

.level{
  font-size:13px;
  opacity:0.7;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="energy-container">
  <div class="energy-bar" id="energyBar"></div>
</div>
<p class="level" id="levelText">Nível 1 – Aquecimento</p>

<div id="home" class="card">
  <h2>Ritual</h2>
  <button onclick="chooseMode('verdade')">Verdade</button>
  <button onclick="chooseMode('desafio')">Desafio</button>
</div>

<div id="playScreen" class="card hidden">
  <h3 id="prompt"></h3>
  <button onclick="complete(5)">Leve</button>
  <button onclick="complete(8)">Intenso</button>
  <button onclick="complete(10)">Marcante</button>
</div>

</div>

<script>

let energy = localStorage.getItem("energy") || 0;
energy = parseInt(energy);
updateEnergy();

function getLevel(){
  if(energy < 25) return 1;
  if(energy < 50) return 2;
  if(energy < 75) return 3;
  return 4;
}

function updateEnergy(){
  let percent = Math.min(energy,100);
  document.getElementById("energyBar").style.width = percent + "%";

  const level = getLevel();
  const levels = {
    1:"Nível 1 – Aquecimento",
    2:"Nível 2 – Conexão",
    3:"Nível 3 – Intensidade",
    4:"Nível 4 – Entrega"
  };
  document.getElementById("levelText").innerText = levels[level];
}

const truths = {
  1:[
    "Qual parte do meu corpo você mais gosta?",
    "Quando você mais sentiu desejo por mim?"
  ],
  2:[
    "O que mais te excita na nossa química?",
    "Qual fantasia leve você nunca me contou?"
  ],
  3:[
    "Qual cenário mais te provoca imaginar comigo?",
    "Qual momento íntimo nosso ficou na sua mente?"
  ],
  4:[
    "Qual pensamento ousado você já teve comigo?",
    "Qual limite você gostaria de explorar juntos?"
  ]
};

const challenges = {
  1:[
    "Mantenha contato visual por 30 segundos.",
    "Sussurre algo provocante."
  ],
  2:[
    "Beije lentamente por 1 minuto.",
    "Conduza um toque demorado."
  ],
  3:[
    "Tire uma peça de roupa com elegância.",
    "Assuma o controle por 2 minutos."
  ],
  4:[
    "Guie um momento de proximidade intensa.",
    "Descreva em voz baixa o que deseja fazer."
  ]
};

function chooseMode(type){
  const level = getLevel();
  const list = type === 'verdade' ? truths[level] : challenges[level];
  const random = list[Math.floor(Math.random()*list.length)];
  document.getElementById("prompt").innerText = random;
  switchScreen("playScreen");
}

function complete(points){
  energy += points;
  localStorage.setItem("energy", energy);
  updateEnergy();
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("playScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

updateEnergy();

</script>

</body>
</html>
