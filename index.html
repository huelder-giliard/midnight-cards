<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ritual – Verdade ou Desafio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at center,#1a1a1f 0%,#0B0B0D 70%);
  color:#C6A75E;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

.card{
  background:rgba(20,20,25,0.95);
  padding:30px;
  border-radius:30px;
  box-shadow:0 0 40px rgba(198,167,94,0.25);
}

button{
  background:linear-gradient(145deg,#C6A75E,#a88d4f);
  border:none;
  padding:14px;
  border-radius:15px;
  font-weight:bold;
  margin-top:12px;
  width:100%;
  color:#000;
}

.hidden{ display:none; }

.energy-container{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}

.energy-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#8B0000,#C6A75E);
  transition:width 0.6s ease;
}

.level{
  font-size:13px;
  opacity:0.7;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="energy-container">
  <div class="energy-bar" id="energyBar"></div>
</div>
<p class="level" id="levelText"></p>

<div id="home" class="card">
  <h2>Ritual</h2>
  <button onclick="chooseMode('verdade')">Verdade</button>
  <button onclick="chooseMode('desafio')">Desafio</button>
</div>

<div id="playScreen" class="card hidden">
  <h3 id="prompt"></h3>
  <button onclick="complete(5)">Leve</button>
  <button onclick="complete(8)">Intenso</button>
  <button onclick="complete(10)">Marcante</button>
</div>

</div>

<script>

let energy = parseInt(localStorage.getItem("energy") || 0);

let history = {
  verdade: {},
  desafio: {}
};

const database = {

1:{
verdade:[
"O que mais te provoca em mim?",
"Qual toque meu você mais gosta?",
"Quando nossa tensão começa a subir?",
"O que mais te arrepia quando estou perto?",
"Qual parte do meu corpo você observa primeiro?"
],
desafio:[
"Mantenha contato visual por 40 segundos.",
"Sussurre algo provocante.",
"Aproxime-se lentamente.",
"Toque minhas mãos por 1 minuto.",
"Faça um elogio sensual em voz baixa."
]
},

2:{
verdade:[
"O que te excita de forma lenta?",
"Qual fantasia leve você gostaria de explorar?",
"O que faz seu corpo reagir imediatamente?",
"Como você prefere ser provocado?",
"Qual lembrança íntima nossa mais te marcou?"
],
desafio:[
"Beije lentamente por 1 minuto.",
"Conduza o momento por 2 minutos.",
"Explore meu pescoço com delicadeza.",
"Use apenas o toque para provocar.",
"Segure minha cintura com firmeza suave."
]
},

3:{
verdade:[
"Qual pensamento ousado você já teve comigo?",
"O que te faz perder o controle?",
"Qual parte sua quer ser mais explorada?",
"Qual cenário mais aumenta sua excitação?",
"Você prefere dominar ou ser dominado?"
],
desafio:[
"Tire uma peça de roupa com elegância.",
"Assuma o controle por 2 minutos.",
"Provoque apenas com o olhar.",
"Guie um momento mais intenso.",
"Controle o ritmo por 2 minutos."
]
},

4:{
verdade:[
"Qual limite você quer explorar juntos?",
"O que te faria se entregar completamente?",
"Qual fantasia você ainda não contou?",
"Como você gosta que a tensão atinja o ápice?",
"O que desperta seu lado mais intenso?"
],
desafio:[
"Guie um momento intenso sem falar.",
"Controle totalmente o ritmo por 3 minutos.",
"Provoque até eu pedir para continuar.",
"Descreva em voz baixa o que deseja fazer.",
"Use apenas toques leves por 3 minutos."
]
}

};

function getLevel(){
  if(energy < 25) return 1;
  if(energy < 50) return 2;
  if(energy < 75) return 3;
  return 4;
}

function updateUI(){
  let percent = Math.min(energy,100);
  document.getElementById("energyBar").style.width = percent + "%";

  const labels = {
    1:"Nível 1 – Aquecimento",
    2:"Nível 2 – Conexão",
    3:"Nível 3 – Intensidade",
    4:"Nível 4 – Entrega"
  };

  if(energy >= 100){
    document.getElementById("levelText").innerText =
    "🔥 Ritual Final Desbloqueado";
  }else{
    document.getElementById("levelText").innerText =
    labels[getLevel()];
  }
}

function getUniqueItem(type){
  const level = getLevel();
  const list = database[level][type];

  if(!history[type][level]){
    history[type][level] = [];
  }

  if(history[type][level].length === list.length){
    history[type][level] = [];
  }

  let available = list.filter(item =>
    !history[type][level].includes(item)
  );

  let random =
    available[Math.floor(Math.random()*available.length)];

  history[type][level].push(random);

  return random;
}

function chooseMode(type){
  if(energy >= 100){
    document.getElementById("prompt").innerText =
    "🔥 Ritual Final: conduzam um momento íntimo livre, seguindo apenas a tensão construída até aqui.";
  }else{
    document.getElementById("prompt").innerText =
    getUniqueItem(type);
  }

  switchScreen("playScreen");
}

function complete(points){
  energy += points;
  localStorage.setItem("energy", energy);
  updateUI();
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("playScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

updateUI();

</script>

</body>
</html>
