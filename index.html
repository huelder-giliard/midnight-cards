<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midnight Cards</title>

<style>
body{
  margin:0;
  background:#0B0B0D;
  color:#C6A75E;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  width:90%;
  max-width:400px;
}

.card{
  background:#111;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(198,167,94,0.3);
}

h1{
  font-size:20px;
}

button{
  background:#C6A75E;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  margin-top:15px;
  width:100%;
}

.stars{
  margin:10px 0;
  font-size:18px;
  letter-spacing:3px;
}

.timer{
  font-size:22px;
  margin-top:15px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div id="home" class="card">
  <h1>Midnight Cards</h1>
  <p id="userId"></p>
  <button onclick="drawCard()">Sortear Carta</button>
</div>

<div id="cardScreen" class="card hidden">
  <h2 id="name"></h2>
  <div class="stars" id="stars"></div>
  <p id="desc"></p>
  <button onclick="startChallenge()">Iniciar Desafio</button>
  <button onclick="goHome()">Voltar</button>
</div>

<div id="challengeScreen" class="card hidden">
  <h2>Modo Desafio</h2>
  <div class="timer" id="timer">60</div>
  <button onclick="finishChallenge()">Concluir</button>
</div>

</div>

<script>

// LOGIN ANÔNIMO SIMPLES
let userId = localStorage.getItem("midnight_user");
if(!userId){
  userId = "User_" + Math.floor(Math.random()*100000);
  localStorage.setItem("midnight_user", userId);
}
document.getElementById("userId").innerText = "ID: " + userId;


// 52 CARTAS
const cards = [];
for(let i=1;i<=52;i++){
  cards.push({
    id:i,
    name:"Carta "+i,
    intensity: Math.floor(Math.random()*5)+1,
    desc:"Desafio especial nível "+(Math.floor(Math.random()*5)+1)
  });
}

let currentCard = null;
let countdown = null;
let timeLeft = 60;


// FUNÇÕES
function drawCard(){
  currentCard = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("name").innerText = currentCard.name;
  document.getElementById("stars").innerText = "★".repeat(currentCard.intensity);
  document.getElementById("desc").innerText = currentCard.desc;
  switchScreen("cardScreen");
}

function startChallenge(){
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;
  switchScreen("challengeScreen");

  countdown = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft<=0){
      clearInterval(countdown);
    }
  },1000);
}

function finishChallenge(){
  clearInterval(countdown);
  let score = localStorage.getItem("score") || 0;
  score++;
  localStorage.setItem("score", score);
  alert("Desafio concluído! Pontuação: "+score);
  goHome();
}

function goHome(){
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("cardScreen").classList.add("hidden");
  document.getElementById("challengeScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

</script>

</body>
</html>
