<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midnight Cards</title>

<style>
body{
  margin:0;
  background:#0B0B0D;
  color:#C6A75E;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:400px;
  text-align:center;
}

.card{
  background:#111;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(198,167,94,0.3);
}

button{
  background:#C6A75E;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  margin-top:15px;
  width:100%;
}

.hidden{ display:none; }

.stars{
  margin:10px 0;
  letter-spacing:3px;
}

.scoreboard{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-size:14px;
}

.timer-circle{
  width:140px;
  height:140px;
  border-radius:50%;
  border:6px solid #C6A75E;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  margin:20px auto;
}
</style>
</head>

<body>

<div class="container">

<div class="card scoreboard">
  <div>👤 Jogador 1: <span id="score1">0</span></div>
  <div>👤 Jogador 2: <span id="score2">0</span></div>
</div>

<div id="home" class="card">
  <h2>Midnight Cards</h2>
  <button onclick="drawCard()">Sortear Carta</button>
</div>

<div id="cardScreen" class="card hidden">
  <h3 id="name"></h3>
  <div class="stars" id="stars"></div>
  <p id="desc"></p>
  <button onclick="startChallenge()">Iniciar Desafio</button>
  <button onclick="goHome()">Voltar</button>
</div>

<div id="challengeScreen" class="card hidden">
  <h3>Modo Desafio</h3>
  <div class="timer-circle" id="timer">60</div>
  <button onclick="finishChallenge(1)">Ponto Jogador 1</button>
  <button onclick="finishChallenge(2)">Ponto Jogador 2</button>
</div>

</div>

<script>

let score1 = localStorage.getItem("score1") || 0;
let score2 = localStorage.getItem("score2") || 0;
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

const cards = [];
for(let i=1;i<=52;i++){
  cards.push({
    id:i,
    name:"Carta "+i,
    intensity: Math.floor(Math.random()*5)+1,
    desc:"Desafio especial nível "+(Math.floor(Math.random()*5)+1)
  });
}

let currentCard = null;
let countdown = null;
let timeLeft = 60;

function drawCard(){
  currentCard = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("name").innerText = currentCard.name;
  document.getElementById("stars").innerText = "★".repeat(currentCard.intensity);
  document.getElementById("desc").innerText = currentCard.desc;
  switchScreen("cardScreen");
}

function startChallenge(){
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;
  switchScreen("challengeScreen");

  countdown = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft<=0){
      clearInterval(countdown);
    }
  },1000);
}

function finishChallenge(player){
  clearInterval(countdown);

  if(player === 1){
    score1++;
    localStorage.setItem("score1", score1);
    document.getElementById("score1").innerText = score1;
  }else{
    score2++;
    localStorage.setItem("score2", score2);
    document.getElementById("score2").innerText = score2;
  }

  goHome();
}

function goHome(){
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("cardScreen").classList.add("hidden");
  document.getElementById("challengeScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

</script>

</body>
</html>
