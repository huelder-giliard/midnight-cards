<script>

let energy = parseInt(localStorage.getItem("energy") || 0);
let usedItems = { verdade:{}, desafio:{} };

function getLevel(){
  if(energy < 25) return 1;
  if(energy < 50) return 2;
  if(energy < 75) return 3;
  return 4;
}

function updateEnergy(){
  let percent = Math.min(energy,100);
  document.getElementById("energyBar").style.width = percent + "%";

  const levels = {
    1:"Nível 1 – Aquecimento",
    2:"Nível 2 – Conexão",
    3:"Nível 3 – Intensidade",
    4:"Nível 4 – Entrega"
  };

  if(energy >= 100){
    document.getElementById("levelText").innerText = "🔥 Ritual Final Desbloqueado";
  }else{
    document.getElementById("levelText").innerText = levels[getLevel()];
  }
}

const database = {
1:{
verdade:[
"O que em mim mais te faz perder o foco?",
"Qual parte do meu corpo você observa primeiro?",
"Quando você sente que nossa tensão começa a subir?",
"O que mais te arrepia quando estou perto?",
"Qual toque meu você mais espera?"
],
desafio:[
"Mantenha contato visual por 60 segundos.",
"Sussurre algo que aumente a tensão.",
"Passe as mãos lentamente pelo meu braço.",
"Aproxime seu rosto do meu sem me tocar.",
"Segure minha cintura por 1 minuto."
]
},
2:{
verdade:[
"Qual tipo de provocação te deixa mais vulnerável?",
"Você prefere dominar ou ser provocado?",
"O que te excita de forma lenta?",
"Qual lembrança íntima nossa te marcou?",
"O que faz seu corpo reagir imediatamente?"
],
desafio:[
"Beije lentamente por 1 minuto.",
"Explore meu pescoço com calma.",
"Conduza meu movimento por 2 minutos.",
"Use apenas o toque para provocar.",
"Controle o ritmo do momento por 1 minuto."
]
},
3:{
verdade:[
"Qual fantasia leve você gostaria de realizar?",
"O que mais te faz perder o controle comigo?",
"Qual parte sua quer ser explorada agora?",
"Qual cenário mais aumenta sua excitação?",
"O que te faz querer ir além?"
],
desafio:[
"Tire uma peça de roupa com elegância.",
"Assuma o controle por 2 minutos.",
"Provoque apenas com o olhar.",
"Guie um momento mais intenso.",
"Use apenas toques lentos por 2 minutos."
]
},
4:{
verdade:[
"Qual limite você gostaria de ultrapassar juntos?",
"Qual pensamento ousado você guarda?",
"O que faria você se entregar completamente?",
"Como você gosta que a tensão atinja o ápice?",
"O que mais desperta seu lado selvagem?"
],
desafio:[
"Guie um momento intenso sem falar.",
"Controle completamente o ritmo.",
"Provoque até eu pedir para continuar.",
"Descreva em voz baixa o que deseja fazer.",
"Use apenas toque leve por 3 minutos."
]
}
};

function getItem(type){
  const level = getLevel();
  const list = database[level][type];

  if(!usedItems[type][level]){
    usedItems[type][level] = [];
  }

  if(usedItems[type][level].length >= list.length){
    usedItems[type][level] = [];
  }

  let available = list.filter(i => !usedItems[type][level].includes(i));
  let random = available[Math.floor(Math.random()*available.length)];

  usedItems[type][level].push(random);
  return random;
}

function chooseMode(type){
  if(energy >= 100){
    document.getElementById("prompt").innerText =
    "🔥 Ritual Final: conduzam um momento íntimo livre, seguindo apenas a tensão construída até aqui.";
  }else{
    document.getElementById("prompt").innerText = getItem(type);
  }

  switchScreen("playScreen");
}

function complete(points){
  energy += points;
  localStorage.setItem("energy", energy);
  updateEnergy();
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("playScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

updateEnergy();

</script>
