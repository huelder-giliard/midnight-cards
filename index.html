<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midnight Cards</title>

<style>
body{
  margin:0;
  background:#0B0B0D;
  color:#C6A75E;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.card{
  background:#111;
  padding:30px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(198,167,94,0.35);
  width:85%;
  max-width:360px;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

h2{
  margin-top:10px;
}

button{
  background:#C6A75E;
  border:none;
  padding:15px;
  border-radius:12px;
  font-weight:bold;
  margin-top:20px;
  width:100%;
}

.stars{
  margin:10px 0;
  font-size:18px;
  letter-spacing:3px;
}

svg{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>Midnight Cards</h1>

<!-- SILHUETA PREMIUM -->
<svg width="240" height="220" viewBox="0 0 240 220">

  <!-- Corpo esquerdo -->
  <path d="
    M80 170
    Q85 130 100 110
    Q110 100 105 85
    Q100 70 90 80
    Q75 95 70 130
    Q65 155 80 170
  "
  stroke="#C6A75E"
  stroke-width="2.5"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- Corpo direito -->
  <path d="
    M160 170
    Q155 130 140 110
    Q130 100 135 85
    Q140 70 150 80
    Q165 95 170 130
    Q175 155 160 170
  "
  stroke="#C6A75E"
  stroke-width="2.5"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- Aproximação dos rostos -->
  <path d="
    M105 95
    Q120 105 135 95
  "
  stroke="#C6A75E"
  stroke-width="2.5"
  fill="none"
  stroke-linecap="round"/>

</svg>

<h2 id="name">Toque para sortear</h2>
<div class="stars" id="stars"></div>
<p id="desc"></p>

<button onclick="drawCard()">Sortear Carta</button>
</div>

<script>
const cards = [
{name:"Entrelaço Suave", intensity:2, desc:"Conexão lenta com contato visual."},
{name:"Abraço Ardente", intensity:4, desc:"Aumente a proximidade e o ritmo."},
{name:"Olhar Profundo", intensity:1, desc:"Segurem o olhar por 1 minuto."},
{name:"Sintonia Lenta", intensity:3, desc:"Movimento sincronizado por 3 minutos."},
{name:"Domínio Suave", intensity:5, desc:"Um conduz por 2 minutos."}
];

function drawCard(){
  const random = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("name").innerText = random.name;
  document.getElementById("desc").innerText = random.desc;
  document.getElementById("stars").innerText = "★".repeat(random.intensity);
}
</script>

</body>
</html>
