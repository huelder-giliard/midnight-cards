<script>

let energy = localStorage.getItem("energy") || 0;
energy = parseInt(energy);

let usedTruths = [];
let usedChallenges = [];

function getLevel(){
  if(energy < 25) return 1;
  if(energy < 50) return 2;
  if(energy < 75) return 3;
  return 4;
}

function updateEnergy(){
  let percent = Math.min(energy,100);
  document.getElementById("energyBar").style.width = percent + "%";

  const levels = {
    1:"Nível 1 – Aquecimento",
    2:"Nível 2 – Conexão",
    3:"Nível 3 – Intensidade",
    4:"Nível 4 – Entrega"
  };
  document.getElementById("levelText").innerText = levels[getLevel()];
}

const truths = {
1:[
"Qual parte do meu corpo você sente mais vontade de tocar?",
"O que em mim mais desperta seu desejo?",
"Qual foi o momento mais provocante que tivemos?",
"Quando você sente mais química entre nós?",
"Que tipo de toque mais te arrepia?"
],
2:[
"Como você gosta de ser provocado antes de algo mais intenso?",
"Qual fantasia leve você gostaria de experimentar comigo?",
"O que te faz perder o controle aos poucos?",
"Como você prefere que eu conduza você?",
"O que mais aumenta sua excitação lentamente?"
],
3:[
"Qual cenário íntimo mais te estimula imaginar comigo?",
"Você prefere dominar ou ser conduzido? Por quê?",
"O que mais te deixa vulnerável comigo?",
"Qual parte do seu corpo quer que eu explore mais?",
"Qual foi seu pensamento mais ousado recentemente?"
],
4:[
"Qual limite você sente vontade de explorar juntos?",
"Qual fantasia você ainda não teve coragem de contar?",
"O que te faria se entregar completamente?",
"Como você gosta que a tensão aumente antes do ápice?",
"Qual momento nosso você quer repetir de forma mais intensa?"
]
};

const challenges = {
1:[
"Mantenha contato visual por 40 segundos.",
"Sussurre algo provocante no ouvido.",
"Toque lentamente minhas mãos por 1 minuto.",
"Aproxime-se e segure minha cintura sem falar.",
"Faça um elogio sensual em voz baixa."
],
2:[
"Beije lentamente por 1 minuto.",
"Explore meu pescoço com delicadeza.",
"Conduza meu movimento por 2 minutos.",
"Use apenas o toque para provocar.",
"Deslize as mãos pelo meu corpo com calma."
],
3:[
"Tire uma peça de roupa com elegância.",
"Assuma o controle por 2 minutos.",
"Guie um momento de provocação prolongada.",
"Use apenas o olhar para me provocar.",
"Segure meus pulsos suavemente e conduza."
],
4:[
"Guie um momento intenso sem falar.",
"Provoque lentamente até eu pedir para continuar.",
"Use apenas toques leves por 2 minutos.",
"Controle o ritmo completamente.",
"Descreva em voz baixa o que deseja fazer."
]
};

function getRandom(list, usedArray){
  if(usedArray.length >= list.length){
    usedArray.length = 0;
  }

  let available = list.filter(item => !usedArray.includes(item));
  let random = available[Math.floor(Math.random()*available.length)];
  usedArray.push(random);
  return random;
}

function chooseMode(type){
  const level = getLevel();
  const list = type === 'verdade' ? truths[level] : challenges[level];
  const used = type === 'verdade' ? usedTruths : usedChallenges;

  const random = getRandom(list, used);
  document.getElementById("prompt").innerText = random;
  switchScreen("playScreen");
}

function complete(points){
  energy += points;
  localStorage.setItem("energy", energy);
  updateEnergy();
  switchScreen("home");
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("playScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

updateEnergy();

</script>
