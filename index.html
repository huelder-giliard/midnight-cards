<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Midnight – Kamasutra Edition</title>

<style>
body{
  margin:0;
  background:#0B0B0D;
  color:#C6A75E;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

.card{
  background:#111;
  padding:30px;
  border-radius:30px;
  box-shadow:0 0 40px rgba(198,167,94,0.25);
}

button{
  background:linear-gradient(145deg,#C6A75E,#a88d4f);
  border:none;
  padding:14px;
  border-radius:15px;
  font-weight:bold;
  margin-top:15px;
  width:100%;
  color:#000;
}

.hidden{ display:none; }

svg{
  margin:20px 0;
}

.timer{
  font-size:40px;
  margin:20px 0;
}
</style>
</head>

<body>

<div class="container">

<div id="home" class="card">
  <h2>Kamasutra Ritual</h2>
  <button onclick="drawCard()">Sortear Posição</button>
</div>

<div id="cardScreen" class="card hidden">
  <h3 id="name"></h3>
  <div id="silhouette"></div>
  <p id="desc"></p>
  <button onclick="startMoment()">Iniciar</button>
</div>

<div id="momentScreen" class="card hidden">
  <h3>Conectem-se</h3>
  <div class="timer" id="timer">60</div>
</div>

</div>

<script>

const cards = [

{
name:"Lótus",
desc:"Sentados frente a frente com conexão visual.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
<path d="M110 80 Q80 120 110 160 Q140 120 110 80" 
stroke="#C6A75E" stroke-width="3" fill="none"/>
<circle cx="95" cy="70" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
<circle cx="125" cy="70" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
</svg>`
},

{
name:"Conchinha",
desc:"Deitados lado a lado em proximidade.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
<path d="M60 130 Q110 80 160 130" 
stroke="#C6A75E" stroke-width="3" fill="none"/>
<circle cx="85" cy="95" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
<circle cx="125" cy="95" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
</svg>`
},

{
name:"Cavalgada",
desc:"Um conduz o ritmo enquanto mantém contato.",
svg:`
<svg width="220" height="220" viewBox="0 0 220 220">
<path d="M110 60 Q80 140 110 170 Q140 140 110 60" 
stroke="#C6A75E" stroke-width="3" fill="none"/>
<circle cx="110" cy="50" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
<circle cx="110" cy="95" r="8" stroke="#C6A75E" stroke-width="2" fill="none"/>
</svg>`
}

];

let timeLeft = 60;
let countdown;

function drawCard(){
  const random = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("name").innerText = random.name;
  document.getElementById("desc").innerText = random.desc;
  document.getElementById("silhouette").innerHTML = random.svg;
  switchScreen("cardScreen");
}

function startMoment(){
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;
  switchScreen("momentScreen");

  countdown = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft<=0){
      clearInterval(countdown);
      switchScreen("home");
    }
  },1000);
}

function switchScreen(screen){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("cardScreen").classList.add("hidden");
  document.getElementById("momentScreen").classList.add("hidden");
  document.getElementById(screen).classList.remove("hidden");
}

</script>

</body>
</html>
